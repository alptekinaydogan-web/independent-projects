name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch or pull request.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default token: read-only.
permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------- #
  # Frontend: React + CRACO + Yarn (Yarn is authoritative for this repo)  #
  # --------------------------------------------------------------------- #
  frontend:
    name: Frontend · install & build
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Verify authoritative lockfile is present
        run: |
          set -euo pipefail
          test -f yarn.lock
          if [ -f package-lock.json ]; then
            echo "::error::A package-lock.json was committed. This repository is Yarn-authoritative. Delete package-lock.json and regenerate yarn.lock instead." >&2
            exit 1
          fi

      - name: Install dependencies (deterministic clean install)
        run: |
          set -euo pipefail
          yarn install --frozen-lockfile --non-interactive

      - name: Production build
        env:
          CI: "true"
          DISABLE_ESLINT_PLUGIN: "true"
        run: |
          set -euo pipefail
          yarn build

      - name: Verify build output
        run: |
          set -euo pipefail
          test -d build
          test -f build/index.html
          test -d build/static
          echo "Build size:"
          du -sh build

  # --------------------------------------------------------------------- #
  # Backend: FastAPI + Python 3.11                                        #
  # --------------------------------------------------------------------- #
  backend:
    name: Backend · install & dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Create virtual environment
        run: |
          set -euo pipefail
          python -m venv .venv

      - name: Upgrade pip
        run: |
          set -euo pipefail
          source .venv/bin/activate
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          set -euo pipefail
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: pip check (broken/incompatible requirements audit)
        run: |
          set -euo pipefail
          source .venv/bin/activate
          pip check

      - name: Backend smoke import
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: ci_smoke
          JWT_SECRET: ci-smoke-secret
          ADMIN_EMAIL: ci@example.com
          ADMIN_PASSWORD: ci-smoke-password
        run: |
          set -euo pipefail
          source .venv/bin/activate
          python -c "import server; assert len(server.app.routes) > 0; print(f'FastAPI app imports OK - {len(server.app.routes)} routes registered')"
