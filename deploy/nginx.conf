user  www-data;
worker_processes  auto;
pid        /run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include            /etc/nginx/mime.types;
    default_type       application/octet-stream;
    sendfile           on;
    keepalive_timeout  65;
    server_tokens      off;

    # Large body uploads — signed upload flow uses multipart forms.
    client_max_body_size 100m;

    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/json application/javascript
                       application/xml application/xml+rss text/javascript
                       application/vnd.ms-fontobject application/x-font-ttf
                       font/opentype image/svg+xml image/x-icon;

    access_log        /var/log/nginx/access.log;
    error_log         /var/log/nginx/error.log warn;

    upstream independent_commerce_backend {
        server 127.0.0.1:8001;
    }

    server {
        listen       80 default_server;
        listen       [::]:80 default_server;
        server_name  _;

        root         /usr/share/nginx/html;
        index        index.html;

        # --- API + docs → FastAPI backend --------------------------------
        location /api/ {
            proxy_pass         http://independent_commerce_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
            proxy_send_timeout 300;
        }

        location = /docs {
            proxy_pass         http://independent_commerce_backend/docs;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
        location /openapi.json {
            proxy_pass         http://independent_commerce_backend/openapi.json;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # --- Immutable static assets ------------------------------------
        location /static/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location = /favicon.svg {
            expires 7d;
            add_header Cache-Control "public";
            try_files $uri =404;
        }

        location = /manifest.json {
            add_header Cache-Control "public, max-age=3600";
            try_files $uri =404;
        }

        # --- React Router SPA fallback ----------------------------------
        location / {
            add_header X-Frame-Options       "SAMEORIGIN"        always;
            add_header X-Content-Type-Options "nosniff"          always;
            add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
            try_files $uri $uri/ /index.html;
        }
    }
}
